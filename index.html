<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Facebook Groups Khilgaon Tuition</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}

body{
background:linear-gradient(135deg,#eef2ff,#f8fafc);
padding:20px
}

.header{text-align:center;margin-bottom:30px}
.header h1{font-size:28px;font-weight:600}
.header p{color:#666;font-size:14px;margin-top:5px}

.container{
max-width:1200px;
margin:auto;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px;
}

.card{
background:#fff;
border-radius:18px;
padding:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
transition:0.3s;
position:relative;
overflow:hidden;
}

.card::before{
content:"";
position:absolute;
top:0;left:0;width:100%;height:5px;
background:linear-gradient(90deg,#1877f2,#42a5f5);
}

.card:hover{
transform:translateY(-6px);
box-shadow:0 20px 40px rgba(0,0,0,0.12);
}

.top-row{
 display:flex;
 align-items:center;
 gap:10px;
 margin-bottom:10px;
}

.logo{
 width:40px;
 height:40px;
 border-radius:50%;
 overflow:hidden;
 display:flex;
 align-items:center;
 justify-content:center;
 background:#1877f2;
 color:#fff;
 font-weight:600;
 font-size:14px;
}

.logo img{
 width:100%;
 height:100%;
 object-fit:cover;
}

.serial{
 font-size:14px;
 color:#999;
}

.group-name{
font-size:16px;
font-weight:600;
margin-bottom:5px
}

.members{
font-size:13px;
color:#777;
margin-bottom:15px
}

.join-btn{
display:block;
text-align:center;
text-decoration:none;
background:linear-gradient(90deg,#1877f2,#42a5f5);
color:#fff;
padding:10px;
border-radius:10px;
font-size:14px;
transition:0.3s;
}

.join-btn:hover{opacity:0.9}

.footer{
text-align:center;
margin-top:40px;
color:#888;
font-size:13px
}

.footer a{
color:#1877f2;
text-decoration:none;
font-weight:500
}

@media(max-width:500px){
.header h1{font-size:22px}
}
</style>
</head>

<body>

<div class="header">
<h1>🔥 Facebook Groups Directory</h1>
<p>Join top communities & grow your network</p>
</div>

<div class="container" id="groupContainer"></div>

<div class="footer">
© <span id="year"></span> Your Brand | Developed by 
<a href="https://arodx.com" target="_blank">arodx.com</a>
